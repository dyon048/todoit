[versions]
agp = "9.1.0"
coreKtx = "1.10.1"
junit = "4.13.2"
junitVersion = "1.1.5"
espressoCore = "3.5.1"
lifecycleRuntimeKtx = "2.6.1"
activityCompose = "1.8.0"
kotlin = "2.2.10"
composeBom = "2025.12.00"
hilt = "2.59.2"
hiltAndroidx = "1.2.0"
ksp = "2.2.10-2.0.2"
room = "2.7.0"
lifecycleViewmodel = "2.8.7"
navigationCompose = "2.8.9"
kotlinxSerialization = "1.7.3"
datastore = "1.1.4"
work = "2.10.1"
playServicesLocation = "21.3.0"
playServicesAuth = "21.3.0"
googleApiServicesSheets = "v4-rev20260213-2.0.0"
